<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboBrain Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .header-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }
        .header-title { font-weight: 600; font-size: 1rem; color: #111827; }
        .header-sub { font-size: 0.78rem; color: #6b7280; }
        .header-right { margin-left: auto; }
        .header-right a {
            font-size: 0.8rem;
            color: #6b7280;
            text-decoration: none;
        }
        .header-right a:hover { color: #6366f1; }

        /* Chat area */
        .chat-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
            padding: 0 16px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: #6b7280;
            text-align: center;
            padding: 40px 20px;
        }
        .empty-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        .empty-state h2 { font-size: 1.1rem; color: #374151; }
        .empty-state p { font-size: 0.875rem; max-width: 380px; }
        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }
        .chip {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8rem;
            color: #374151;
            cursor: pointer;
            transition: all 0.15s;
        }
        .chip:hover { border-color: #6366f1; color: #6366f1; background: #eef2ff; }

        /* Messages */
        .message-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .message-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
        }
        .avatar.ai {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .avatar.user-av {
            background: #e5e7eb;
            color: #374151;
        }

        .bubble-wrap { display: flex; flex-direction: column; gap: 6px; max-width: 80%; }
        .message-row.user .bubble-wrap { align-items: flex-end; }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .bubble.ai {
            background: white;
            color: #111827;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }
        .bubble.user {
            background: #6366f1;
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* Sources */
        .sources {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 2px;
        }
        .source-tag {
            font-size: 0.72rem;
            color: #6366f1;
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            border-radius: 10px;
            padding: 2px 10px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .source-tag:hover { background: #e0e7ff; }
        .source-tag.no-link { color: #9ca3af; background: #f9fafb; border-color: #e5e7eb; }

        /* Feedback row */
        .feedback-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .feedback-label { font-size: 0.75rem; color: #9ca3af; }
        .thumb-btn {
            background: none;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
            line-height: 1.4;
        }
        .thumb-btn:hover { border-color: #6366f1; background: #eef2ff; }
        .thumb-btn.selected-up { background: #d1fae5; border-color: #34d399; }
        .thumb-btn.selected-down { background: #fee2e2; border-color: #f87171; }

        /* Notes field (shown on thumbs down) */
        .notes-wrap {
            display: none;
            margin-top: 8px;
            gap: 6px;
        }
        .notes-wrap.visible { display: flex; }
        .notes-input {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.82rem;
            font-family: inherit;
            resize: none;
            height: 58px;
            outline: none;
            transition: border 0.15s;
        }
        .notes-input:focus { border-color: #6366f1; }
        .notes-submit {
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 14px;
            font-size: 0.8rem;
            cursor: pointer;
            align-self: flex-end;
            height: 34px;
            white-space: nowrap;
        }
        .notes-submit:hover { background: #b91c1c; }
        .feedback-done { font-size: 0.75rem; color: #6b7280; font-style: italic; }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            width: fit-content;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #9ca3af;
            animation: bounce 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Input area */
        .input-area {
            flex-shrink: 0;
            padding: 12px 0 20px;
        }
        .input-box {
            display: flex;
            gap: 8px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 10px 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            transition: border 0.15s;
        }
        .input-box:focus-within { border-color: #6366f1; }
        #user-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            height: 24px;
            max-height: 120px;
            overflow-y: hidden;
            line-height: 1.5;
            background: transparent;
        }
        #send-btn {
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 9px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            align-self: flex-end;
            transition: background 0.15s;
        }
        #send-btn:hover { background: #4f46e5; }
        #send-btn:disabled { background: #d1d5db; cursor: not-allowed; }
        #send-btn svg { width: 16px; height: 16px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">TB</div>
    <div>
        <div class="header-title">TurboBrain</div>
        <div class="header-sub">Internal Knowledge Assistant</div>
    </div>
    <div class="header-right" style="display:flex;align-items:center;gap:12px;">
        <button onclick="startNewChat()" style="background:none;border:1px solid #e5e7eb;border-radius:8px;padding:5px 12px;font-size:0.8rem;color:#374151;cursor:pointer;" title="Start a new conversation">+ New Chat</button>
        <a href="/admin">Admin ↗</a>
    </div>
</div>

<div class="chat-wrapper">
    <div id="messages">
        <div class="empty-state" id="empty-state">
            <div class="empty-icon">💡</div>
            <h2>Ask anything about your knowledge base</h2>
            <p>Get instant answers from your connected sources — Confluence, Google Docs, Intercom, and more.</p>
            <div class="suggestion-chips">
                <div class="chip" onclick="sendSuggestion(this.textContent)">How do I reset a password?</div>
                <div class="chip" onclick="sendSuggestion(this.textContent)">What is the cancellation policy?</div>
                <div class="chip" onclick="sendSuggestion(this.textContent)">How does billing work?</div>
                <div class="chip" onclick="sendSuggestion(this.textContent)">Escalation process</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <textarea
                id="user-input"
                placeholder="Ask a question..."
                rows="1"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button id="send-btn" onclick="sendMessage()" title="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const API_BASE = '';
    let isLoading = false;
    let conversationId = null;

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        el.style.overflowY = el.scrollHeight > 120 ? 'auto' : 'hidden';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function sendSuggestion(text) {
        document.getElementById('user-input').value = text;
        sendMessage();
    }

    function hideEmptyState() {
        const es = document.getElementById('empty-state');
        if (es) es.remove();
    }

    function appendUserBubble(text) {
        hideEmptyState();
        const row = document.createElement('div');
        row.className = 'message-row user';
        row.innerHTML = `
            <div class="avatar user-av">You</div>
            <div class="bubble-wrap">
                <div class="bubble user">${escapeHtml(text)}</div>
            </div>
        `;
        document.getElementById('messages').appendChild(row);
        scrollToBottom();
    }

    function appendTypingIndicator() {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.id = 'typing-row';
        row.innerHTML = `
            <div class="avatar ai">TB</div>
            <div class="bubble-wrap">
                <div class="typing-indicator">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>
        `;
        document.getElementById('messages').appendChild(row);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const el = document.getElementById('typing-row');
        if (el) el.remove();
    }

    function appendAIBubble(messageId, answer, sources) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.dataset.messageId = messageId;

        const sourceHtml = sources && sources.length > 0
            ? `<div class="sources">${sources.map(s =>
                s.source_url
                    ? `<a href="${escapeHtml(s.source_url)}" target="_blank" rel="noopener" class="source-tag">📄 ${escapeHtml(s.title)} ↗</a>`
                    : `<span class="source-tag no-link">📄 ${escapeHtml(s.title)}</span>`
              ).join('')}</div>`
            : '';

        row.innerHTML = `
            <div class="avatar ai">TB</div>
            <div class="bubble-wrap">
                <div class="bubble ai">${escapeHtml(answer)}</div>
                ${sourceHtml}
                <div class="feedback-row">
                    <span class="feedback-label">Helpful?</span>
                    <button class="thumb-btn" onclick="thumbsUp(this, '${messageId}')" title="Yes, helpful">👍</button>
                    <button class="thumb-btn" onclick="thumbsDown(this, '${messageId}')" title="Not helpful">👎</button>
                </div>
                <div class="notes-wrap" id="notes-${messageId}">
                    <textarea class="notes-input" placeholder="What was wrong or missing? (optional)" id="notes-text-${messageId}"></textarea>
                    <button class="notes-submit" onclick="submitNotes('${messageId}')">Send</button>
                </div>
            </div>
        `;
        document.getElementById('messages').appendChild(row);
        scrollToBottom();
    }

    async function thumbsUp(btn, messageId) {
        const row = btn.closest('.message-row');
        row.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('selected-up', 'selected-down'));
        btn.classList.add('selected-up');
        document.getElementById('notes-' + messageId).classList.remove('visible');
        await sendFeedback(messageId, 'positive', null);
        showFeedbackDone(btn.closest('.feedback-row'), '👍 Thanks for the feedback!');
    }

    async function thumbsDown(btn, messageId) {
        const row = btn.closest('.message-row');
        row.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('selected-up', 'selected-down'));
        btn.classList.add('selected-down');
        const notesWrap = document.getElementById('notes-' + messageId);
        notesWrap.classList.add('visible');
        document.getElementById('notes-text-' + messageId).focus();
        // Record negative feedback immediately (notes can be added via "Send")
        await sendFeedback(messageId, 'negative', null);
    }

    async function submitNotes(messageId) {
        const notes = document.getElementById('notes-text-' + messageId).value.trim();
        await sendFeedback(messageId, 'negative', notes || null);
        document.getElementById('notes-' + messageId).classList.remove('visible');
        // Show done message
        const feedbackRow = document.querySelector(`[data-message-id="${messageId}"] .feedback-row`);
        if (feedbackRow) showFeedbackDone(feedbackRow, '👎 Feedback recorded. We\'ll use this to improve.');
    }

    function showFeedbackDone(feedbackRow, text) {
        feedbackRow.innerHTML = `<span class="feedback-done">${escapeHtml(text)}</span>`;
    }

    async function sendFeedback(messageId, feedback, notes) {
        try {
            await fetch(`${API_BASE}/api/chat/feedback`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message_id: messageId, feedback, notes }),
            });
        } catch (e) {
            console.error('Feedback error:', e);
        }
    }

    async function sendMessage() {
        if (isLoading) return;
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = '24px';
        isLoading = true;
        document.getElementById('send-btn').disabled = true;

        appendUserBubble(text);
        appendTypingIndicator();

        try {
            const res = await fetch(`${API_BASE}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, conversation_id: conversationId }),
            });
            const data = await res.json();
            removeTypingIndicator();
            if (res.ok) {
                conversationId = data.conversation_id;
                appendAIBubble(data.message_id, data.answer, data.sources);
            } else {
                appendAIBubble('err-' + Date.now(), data.detail || 'Something went wrong.', []);
            }
        } catch (e) {
            removeTypingIndicator();
            appendAIBubble('err-' + Date.now(), 'Connection error: ' + e.message, []);
        }

        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        input.focus();
    }

    function scrollToBottom() {
        const el = document.getElementById('messages');
        el.scrollTop = el.scrollHeight;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function startNewChat() {
        conversationId = null;
        const messages = document.getElementById('messages');
        messages.innerHTML = `
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">💡</div>
                <h2>Ask anything about your knowledge base</h2>
                <p>Get instant answers from your connected sources — Confluence, Google Docs, Intercom, and more.</p>
                <div class="suggestion-chips">
                    <div class="chip" onclick="sendSuggestion(this.textContent)">How do I reset a password?</div>
                    <div class="chip" onclick="sendSuggestion(this.textContent)">What is the cancellation policy?</div>
                    <div class="chip" onclick="sendSuggestion(this.textContent)">How does billing work?</div>
                    <div class="chip" onclick="sendSuggestion(this.textContent)">Escalation process</div>
                </div>
            </div>
        `;
        document.getElementById('user-input').focus();
    }

    // Auto-focus
    document.getElementById('user-input').focus();
</script>
</body>
</html>
